<div class="container bg-white p-4 rounded shadow mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 style="color: #333;">Gestión de Usuarios</h2>
    <button class="btn btn-primary" onclick="prepararNuevoUsuario()">+ Nuevo Usuario</button>
  </div>
  
  <div class="row mb-3">
    <div class="col">
      <input type="text" id="buscarUsuario" class="form-control" onkeyup="filtrarTablaUsuarios()" placeholder="🔍 Buscar por nombre, ID o celular...">
    </div>
  </div>

  <div class="table-responsive">
    <table class="table table-hover align-middle">
      <thead class="table-light">
        <tr>
          <th style="width: 5%">ID</th>
          <th style="width: 20%">Nombre</th>
          <th style="width: 20%">Apellido</th>
          <th style="width: 20%">Celular</th>
          <th style="width: 15%">Deuda</th>
          <th style="width: 20%" class="text-center">Acciones</th>
        </tr>
      </thead>
      <tbody id="cuerpoTabla">
        </tbody>
    </table>
  </div>
</div>

<div class="modal fade" id="modalUsuario" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow">
      <div class="modal-header">
        <h5 class="modal-title" id="tituloModal">Datos del Usuario</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="inputRow">
        <div class="mb-3">
          <label class="form-label">ID (Automático)</label>
          <input type="text" id="id" class="form-control" readonly style="background-color: #e9ecef;">
        </div>
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Nombre</label>
            <input type="text" id="nombre" class="form-control">
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Apellido</label>
            <input type="text" id="apellido" class="form-control">
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">Celular</label>
          <input type="text" id="celular" class="form-control" 
                placeholder="300-000-0000" 
                onkeyup="formatearCelular(this)" 
                maxlength="12">
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" class="btn btn-success" onclick="guardar()">Guardar Datos</button>
      </div>
    </div>
  </div>
</div>
